    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  intl_phone_field: ^3.2.0

  cupertino_icons: ^1.0.8
  lottie: ^3.1.0
